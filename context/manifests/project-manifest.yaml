repo:
  name: agent-context-tenets
  status: phase-1-active
  purpose: >-
    A reusable, language-agnostic AI agent context framework optimized for
    progressive loading under limited context windows.

entrypoints:
  - README.md
  - context/00-map.md
  - context/manifests/project-manifest.yaml

loading_order:
  - README.md
  - context/00-map.md
  - context/manifests/project-manifest.yaml
  - nearest area map or manifest
  - smallest relevant canonical leaf docs
  - docs/adr/*.md as needed
  - examples/ only when canonical docs are insufficient

areas:
  - path: context/principles
    role: canonical-rules
    map: context/principles/00-map.md
    manifest: context/manifests/principles-manifest.yaml
    load_when:
      - defining standards
      - reviewing designs
      - resolving ambiguity in core concepts
    status: active

  - path: context/patterns
    role: reusable-structures
    load_when:
      - comparing design options
      - modeling workflows or boundaries
      - selecting decomposition patterns
    status: planned

  - path: context/playbooks
    role: task-guidance
    load_when:
      - executing a design task
      - writing or reviewing artifacts
      - onboarding an agent session
    status: planned

  - path: context/glossary
    role: vocabulary
    load_when:
      - naming entities
      - aligning terms
      - interpreting documents consistently
    status: planned

  - path: context/review
    role: checklists-and-gates
    load_when:
      - architecture review
      - contribution review
      - release/readiness assessment
    status: planned

  - path: context/manifests
    role: retrieval-metadata
    load_when:
      - deciding what to read next
      - powering automation or linting
      - auditing discoverability
    status: active

  - path: docs/research
    role: background-analysis
    canonical: false
    load_when:
      - understanding why the repo is shaped this way
      - revisiting source influences
    status: active

canonical_documents:
  - path: context/principles/01-information-architecture-and-manifests.md
    topic: information-architecture
  - path: context/principles/02-ubiquitous-language-and-naming.md
    topic: ubiquitous-language
  - path: context/principles/03-bounded-contexts-and-boundaries.md
    topic: bounded-contexts
  - path: context/principles/04-workflows-invariants-and-state.md
    topic: workflows
  - path: context/principles/05-errors-and-edge-responsibilities.md
    topic: errors-and-edges
  - path: context/principles/06-deep-modules-and-information-hiding.md
    topic: complexity-and-structure
  - path: docs/adr/0001-example-strategy.md
    topic: examples-policy
  - path: docs/adr/0002-information-architecture-and-manifests.md
    topic: structure-decision

size_budgets:
  root_docs_max_lines: 200
  map_docs_max_lines: 150
  leaf_docs_target_lines: 80-220

policies:
  language_agnostic_core: true
  examples_are_secondary: true
  manifests_required_for_major_areas: true
  link_instead_of_duplicate: true
  update_maps_and_manifests_with_canonical_changes: true
