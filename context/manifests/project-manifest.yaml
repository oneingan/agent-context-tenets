repo:
  name: agent-context-tenets
  status: bootstrap
  purpose: >-
    A reusable, language-agnostic AI agent context framework optimized for
    progressive loading under limited context windows.

loading_order:
  - README.md
  - context/00-map.md
  - context/manifests/project-manifest.yaml
  - docs/repository-plan.md
  - docs/adr/0001-example-strategy.md

areas:
  - path: context/principles
    role: canonical-rules
    load_when:
      - defining standards
      - reviewing designs
      - resolving ambiguity in core concepts
    status: planned

  - path: context/patterns
    role: reusable-structures
    load_when:
      - comparing design options
      - modeling workflows or boundaries
      - selecting decomposition patterns
    status: planned

  - path: context/playbooks
    role: task-guidance
    load_when:
      - executing a design task
      - writing or reviewing artifacts
      - onboarding an agent session
    status: planned

  - path: context/glossary
    role: vocabulary
    load_when:
      - naming entities
      - aligning terms
      - interpreting documents consistently
    status: planned

  - path: context/review
    role: checklists-and-gates
    load_when:
      - architecture review
      - contribution review
      - release/readiness assessment
    status: planned

  - path: docs/research
    role: background-analysis
    canonical: false
    load_when:
      - understanding why the repo is shaped this way
      - revisiting source influences
    status: active

size_budgets:
  root_docs_max_lines: 200
  map_docs_max_lines: 150
  leaf_docs_target_lines: 80-220

policies:
  language_agnostic_core: true
  examples_are_secondary: true
  manifests_required_for_major_areas: true
  link_instead_of_duplicate: true
